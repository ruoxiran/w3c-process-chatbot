services:
  api:
    build:
      context: ..
      dockerfile: deploy/docker/api.Dockerfile
    env_file:
      - ../.env
    environment:
      # Inside the docker network the API reaches Ollama by service
      # name, not localhost. Override via .env when pointing at a
      # remote endpoint.
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
    ports:
      - "8000:8000"
    volumes:
      # Corpus + dense-embedding cache are gitignored and built locally
      # with scripts/import_w3c_sources.py + build_embedding_cache.py.
      # Bind-mount them at runtime so the image stays small.
      - ../data:/app/data

  web:
    build:
      context: ..
      dockerfile: deploy/docker/web.Dockerfile
    env_file:
      - ../.env
    ports:
      - "3000:3000"
    depends_on:
      - api

  # Optional: local Ollama LLM. Skip the profile to point
  # ``LLM_PROVIDER=openai-compatible`` at an external endpoint instead.
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    profiles: ["llm"]

volumes:
  ollama-data:
